services:
  web:
    image: nginx:alpine
    volumes:
      - ./site:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    networks:
      - n8n_default
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.wattclever.rule=Host(`wattclever.de`) || Host(`www.wattclever.de`)"
      - "traefik.http.routers.wattclever.entrypoints=web,websecure"
      - "traefik.http.routers.wattclever.tls=true"
      - "traefik.http.routers.wattclever.tls.certresolver=mytlschallenge"
      - "traefik.http.services.wattclever.loadbalancer.server.port=80"

networks:
  n8n_default:
    external: true
